name: RefillageSupplyReorder
options:
  bundleIdPrefix: com.shimondeitel.refillage
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RefillageSupplyReorder:
    type: application
    platform: iOS
    sources:
      - path: RefillageSupplyReorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.refillage
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RefillageSupplyReorder/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RefillageSupplyReorderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RefillageSupplyReorderTests
      - path: RefillageSupplyReorder.storekit
    dependencies:
      - target: RefillageSupplyReorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.refillage.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RefillageSupplyReorderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RefillageSupplyReorderUITests
    dependencies:
      - target: RefillageSupplyReorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.refillage.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RefillageSupplyReorder:
    build:
      targets:
        RefillageSupplyReorder: all
        RefillageSupplyReorderTests: [test]
        RefillageSupplyReorderUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RefillageSupplyReorder.storekit
    test:
      config: Debug
      storeKitConfiguration: RefillageSupplyReorder.storekit
      targets:
        - RefillageSupplyReorderTests
        - RefillageSupplyReorderUITests
    archive:
      config: Release
